<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <filter id="stain">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.40  0 0 0 0 0.18  0 0 0 0.55 0"/>
    </filter>
    <filter id="fibre2">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" seed="4"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.28  0 0 0 0.20 0"/>
    </filter>
  </defs>
  <rect width="360" height="360" fill="#F4E8C8"/>
  <rect width="360" height="360" filter="url(#stain)"/>
  <rect width="360" height="360" filter="url(#fibre2)"/>
</svg>
