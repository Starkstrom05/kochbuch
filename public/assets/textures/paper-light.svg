<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <filter id="fibre">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.72  0 0 0 0 0.62  0 0 0 0 0.40  0 0 0 0.18 0"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="turbulence" baseFrequency="2.2" numOctaves="1" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.25  0 0 0 0.08 0"/>
    </filter>
  </defs>
  <rect width="360" height="360" fill="#FBF6E9"/>
  <rect width="360" height="360" filter="url(#fibre)"/>
  <rect width="360" height="360" filter="url(#grain)"/>
</svg>
