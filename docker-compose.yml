services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jonas/kochbuch:${KOCHBUCH_VERSION:-dev}
    container_name: kochbuch-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:/data/db/kochbuch.db"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}"
      UPLOAD_DIR: "/data/images"
      KOCHBUCH_VERSION: "${KOCHBUCH_VERSION:-dev}"
      TZ: "Europe/Berlin"
    volumes:
      - kochbuch-db:/data/db
      - kochbuch-images:/data/images
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
    mem_limit: 1g

  ollama:
    image: ollama/ollama:latest
    container_name: kochbuch-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - kochbuch-ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 7g
    # GPU optional — auskommentieren falls vorhanden
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  caddy:
    image: caddy:2-alpine
    container_name: kochbuch-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - kochbuch-caddy-data:/data
      - kochbuch-caddy-config:/config
    depends_on:
      - app
    profiles: ["prod"]

volumes:
  kochbuch-db:
  kochbuch-images:
  kochbuch-ollama:
  kochbuch-caddy-data:
  kochbuch-caddy-config:
