# Kochbuch — TrueNAS Scale Custom App (Electric Eel +)
#
# Image wird aus GitHub Container Registry gepullt — kein lokales Bauen nötig.
# Fertig zum Einfügen in: Apps → Discover → Custom App
#
# VORBEREITUNG (einmalig):
#   1. ZFS-Datasets anlegen (TrueNAS UI):
#        /mnt/<pool>/apps/kochbuch/db
#        /mnt/<pool>/apps/kochbuch/images
#        /mnt/<pool>/apps/kochbuch/ollama
#
#   2. AUTH_SECRET generieren (auf deinem Laptop):
#        openssl rand -base64 32
#      Den Wert unten in services.app.environment.AUTH_SECRET einsetzen.
#
#   3. Drei Anpassungen unten:
#      - Pfad "/mnt/tank/apps/kochbuch" → dein Pool-Pfad
#      - "<nas-ip>" → die LAN-IP deines NAS
#      - "REPLACE_WITH_..." → das generierte AUTH_SECRET
#
# NACH DEM ERSTEN START (TrueNAS App → Shell):
#   docker exec -it kochbuch-app npx tsx prisma/seed.ts
#   docker exec -it kochbuch-ollama ollama pull phi3:3.8b-mini-4k-instruct-q4_K_M
#
# UPDATE auf neue Version:
#   TrueNAS App → Edit → Image-Tag auf neuere Version (z.B. :v0.2.0) → Save
#   Migrationen + DB-Backup laufen automatisch.

services:
  app:
    image: ghcr.io/starkstrom05/kochbuch:v0.1.6
    container_name: kochbuch-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:/data/db/kochbuch.db"
      AUTH_SECRET: "REPLACE_WITH_OPENSSL_RAND_BASE64_32"
      AUTH_URL: "http://<nas-ip>:3000"
      AUTH_TRUST_HOST: "true"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "phi3:3.8b-mini-4k-instruct-q4_K_M"
      UPLOAD_DIR: "/data/images"
      KOCHBUCH_VERSION: "0.1.6"
      TZ: "Europe/Berlin"
    volumes:
      - /mnt/tank/apps/kochbuch/db:/data/db
      - /mnt/tank/apps/kochbuch/images:/data/images
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: kochbuch-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - /mnt/tank/apps/kochbuch/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 7g
