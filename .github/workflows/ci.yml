name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    # Prisma 7 loads prisma.config.ts (which reads DATABASE_URL eagerly) on every
    # CLI call, so `prisma generate` needs it set even though no query runs here.
    env:
      DATABASE_URL: "file:./ci-build.db"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test

    env:
      DATABASE_URL: "file:./e2e-test.db"
      AUTH_SECRET: "ci-test-secret-do-not-use"
      AUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
      OLLAMA_BASE_URL: "http://localhost:11434"
      UPLOAD_DIR: "/tmp/kochbuch-e2e-uploads"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Migrate + seed test DB
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
