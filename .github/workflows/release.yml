name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Docker image + push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release
      packages: write   # for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase image name
        id: img
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=${OWNER_LC}/kochbuch" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG"                       >> "$GITHUB_OUTPUT"
          echo "major_minor=${TAG%.*}"              >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:v${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.ver.outputs.major_minor }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          build-args: |
            KOCHBUCH_VERSION=${{ steps.ver.outputs.version }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Update auf TrueNAS / Docker

            ```bash
            docker compose pull
            docker compose up -d
            ```

            Das Entrypoint-Skript sichert die Datenbank automatisch vor der Migration.
